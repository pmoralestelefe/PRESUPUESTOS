<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAC - Gestión Comercial Pro</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #3b82f6; --green: #22c55e; --red: #ef4444; }
  body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: var(--text); padding-bottom: 50px; }
  nav { display: flex; background: #020617; border-bottom: 2px solid var(--accent); position: sticky; top: 0; z-index: 100; }
  nav button { flex: 1; padding: 15px; border: none; background: none; color: #94a3b8; font-weight: bold; cursor: pointer; }
  nav button.active { color: #fff; border-bottom: 3px solid var(--accent); }
  header { display: flex; align-items: center; justify-content: center; gap: 12px; padding: 15px; background: #020617; }
  header h1 { font-size: 18px; margin: 0; color: #fff; }
  .container { padding: 20px; max-width: 800px; margin: auto; }
  .section { display: none; }
  .section.active { display: block; }
  .grid-form { display: grid; grid-template-columns: 1fr; gap: 12px; }
  @media (min-width: 600px) { .grid-form { grid-template-columns: 1fr 1fr; } .full { grid-column: span 2; } }
  label { font-size: 11px; color: #94a3b8; text-transform: uppercase; font-weight: 600; margin-bottom: 4px; display: block; }
  input, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #020617; color: #fff; box-sizing: border-box; outline: none; }
  button.main { width: 100%; padding: 16px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
  .btn-green { background: var(--green); color: #052e16; }
  .btn-blue { background: var(--accent); color: #fff; }
  .btn-gray { background: #475569; color: #fff; }
  .btn-danger { background: var(--red); color: #fff; }
  .card { background: var(--card); padding: 18px; border-radius: 12px; margin-top: 15px; border: 1px solid #334155; }
  .historial-item { background: var(--card); padding: 15px; border-radius: 10px; margin-bottom: 10px; border-left: 4px solid var(--accent); display: flex; justify-content: space-between; align-items: center; }
  .hist-price { font-weight: bold; color: var(--green); margin-right: 15px; }
</style>
</head>
<body>

<nav>
  <button id="nav-calc" class="active" onclick="switchTab('calculadora')">NUEVA VENTA</button>
  <button id="nav-hist" onclick="switchTab('historial')">HISTORIAL</button>
</nav>

<header>
  <h1>PORTONES AUTOMÁTICOS CÓRDOBA</h1>
</header>

<div class="container">
  
  <div id="calculadora" class="section active">
    <div class="grid-form">
      <div class="full"><label>Cliente</label><input id="cliente" placeholder="Nombre del cliente"></div>
      <div><label>WhatsApp</label><input id="telefono" type="tel" placeholder="351xxxxxxx"></div>
      <div><label>Dólar Hoy ($)</label><input id="dolar" type="number" value="1410"></div>
      
      <div><label>Tipo Portón</label><select id="tipo" onchange="actualizarInterfaz()">
        <option value="corredizo">Corredizo</option>
        <option value="levadizo">Levadizo</option>
      </select></div>
      
      <div><label>Modelo Comercial</label><select id="modo_medida" onchange="actualizarInterfaz()">
        <option value="especial">Medida Especial (a medida)</option>
        <option value="estandar">Medida Estándar PAC</option>
      </select></div>

      <div id="div_medida_especial" class="full grid-form" style="padding:0">
        <div><label>Ancho (m)</label><input id="ancho" type="number" step="0.01"></div>
        <div><label>Alto (m)</label><input id="alto" type="number" step="0.01"></div>
      </div>

      <div id="div_medida_estandar" class="full" style="display:none">
        <label>Seleccionar Medida Estándar</label>
        <select id="select_estandar"></select>
      </div>

      <div class="full"><label>Servicio</label>
        <select id="motor" onchange="actualizarInterfaz()">
          <option value="si">Fabricación + Automatización</option>
          <option value="no">Sólo Fabricación</option>
          <option value="solo_inst">Solo Motor (Existente)</option>
        </select>
      </div>

      <div id="div_peso" class="full" style="display:none"><label>Tracción</label>
        <select id="peso_porton"><option value="liviano">Liviano</option><option value="pesado">Pesado</option></select>
      </div>

      <div id="div_motor_data" class="full grid-form" style="display:grid; padding:0">
        <div><label>Precio Motor ($)</label><input id="precio_motor" type="number"></div>
        <div><label>Modelo Motor</label><input id="modelo_motor" placeholder="Ej: PPA Jet Flex"></div>
      </div>
      
      <div class="full card">
        <label style="color:var(--accent)">Adicionales PAC</label>
        <div class="grid-form" style="margin-top:10px">
            <div><label>Acceso Peatonal</label>
              <select id="tipo_acceso">
                <option value="0">Ninguno</option>
                <option value="127.96">Puerta de Escape Estándar (127.96 USD)</option>
                <option value="329.68">Conjugada Simple Revest. (329.68 USD)</option>
                <option value="395.39">Conjugada Doble Revest. (395.39 USD)</option>
              </select>
            </div>
            <div><label>Lucera</label><select id="lucera"><option value="no">No</option><option value="si">Sí</option></select></div>
            <div class="full"><label>Otros Extras ($)</label><input id="extras" type="number" value="0"></div>
        </div>
      </div>
    </div>

    <button class="main btn-green" onclick="calcular()">GENERAR Y GUARDAR</button>
    <div id="resultado" class="card" style="display:none; text-align:center">
        <h2 id="res_total" style="color:var(--green); margin:0"></h2>
        <div class="grid-form" style="margin-top:15px">
            <button class="main btn-blue" onclick="enviarWhatsApp()">WhatsApp</button>
            <button class="main btn-gray" onclick="generarPDF()">Descargar PDF Comercial</button>
        </div>
    </div>
  </div>

  <div id="historial" class="section">
    <div style="display:flex; gap:10px">
        <button class="main btn-blue" onclick="exportarReporteMensual()">Reporte Mensual</button>
        <button class="main btn-danger" onclick="borrarTodo()">Limpiar Todo</button>
    </div>
    <div id="lista-historial" style="margin-top:20px"></div>
  </div>
</div>

<script>
const preciosEstandar = {
    corredizo: [ { desc: "3.00 x 2.00 Estándar", usd: 619.31, ancho: 3, alto: 2 } ],
    levadizo: [
        { desc: "2.40x2.05 s/puerta", usd: 693.51, ancho: 2.40, alto: 2.05 },
        { desc: "2.40x2.05 c/puerta", usd: 823.27, ancho: 2.40, alto: 2.05 },
        { desc: "2.40x2.20 s/puerta", usd: 721.29, ancho: 2.40, alto: 2.20 },
        { desc: "2.40x2.20 c/puerta", usd: 855.65, ancho: 2.40, alto: 2.20 },
        { desc: "2.62x2.05 s/puerta", usd: 711.48, ancho: 2.62, alto: 2.05 },
        { desc: "2.62x2.05 c/puerta", usd: 841.43, ancho: 2.62, alto: 2.05 },
        { desc: "2.62x2.20 s/puerta", usd: 742.331, ancho: 2.62, alto: 2.20 },
        { desc: "2.62x2.20 c/puerta", usd: 876.73, ancho: 2.62, alto: 2.20 }
    ]
};

function actualizarInterfaz() {
    const tipo = document.getElementById('tipo').value;
    const modo = document.getElementById('modo_medida').value;
    const motor = document.getElementById('motor').value;
    document.getElementById('div_medida_especial').style.display = (modo === 'especial') ? 'grid' : 'none';
    document.getElementById('div_medida_estandar').style.display = (modo === 'estandar') ? 'block' : 'none';
    document.getElementById('div_motor_data').style.display = (motor !== 'no') ? 'grid' : 'none';
    document.getElementById('div_peso').style.display = (motor === 'solo_inst') ? 'block' : 'none';
    if (modo === 'estandar') {
        const select = document.getElementById('select_estandar');
        select.innerHTML = "";
        preciosEstandar[tipo].forEach((p, i) => {
            select.innerHTML += `<option value="${i}">${p.desc}</option>`;
        });
    }
}

function num(id){ return parseFloat(document.getElementById(id).value)||0; }

function calcular() {
    const cliente = document.getElementById('cliente').value;
    const tipo = document.getElementById('tipo').value;
    const modo = document.getElementById('modo_medida').value;
    const motorModo = document.getElementById('motor').value;
    const dolar = num('dolar');
    const lucera = document.getElementById('lucera').value;
    const usdAcceso = parseFloat(document.getElementById('tipo_acceso').value);
    
    if (!cliente) return alert("Nombre de cliente requerido");

    let ancho, alto, usdBase;
    if (modo === 'estandar') {
        const item = preciosEstandar[tipo][document.getElementById('select_estandar').value];
        ancho = item.ancho; alto = item.alto; usdBase = item.usd;
    } else {
        ancho = num('ancho'); alto = num('alto');
        if(!ancho || !alto) return alert("Medidas requeridas");
        usdBase = (ancho * alto) * (tipo === "levadizo" ? 145.41 : 157.24);
    }

    let total = 0;
    let descServicio = motorModo === 'solo_inst' ? "Automatización Profesional" : "Fabricación e Instalación";
    
    if (motorModo === 'solo_inst') {
        total = (tipo === 'corredizo') ? ((document.getElementById('peso_porton').value === 'pesado' ? 200000 + num('precio_motor') : 400000) + (ancho > 3 ? (ancho - 3) * 30000 : 0)) : (ancho > 2.60 ? 200000 + num('precio_motor') : 400000);
    } else {
        total = ((usdBase * dolar) * (motorModo === "no" ? 1.3 : 1)) + ((motorModo === "si") ? (num('precio_motor') + 200000) : 0);
    }

    total = Math.round(total + (usdAcceso * dolar) + num('extras'));

    let textoAcceso = "";
    if(usdAcceso === 127.96) textoAcceso = "Puerta de escape estándar";
    if(usdAcceso === 329.68) textoAcceso = "Puerta conjugada (Simple Revest.)";
    if(usdAcceso === 395.39) textoAcceso = "Puerta conjugada (Doble Revest.)";

    window.detalle = {
        cliente, tel: document.getElementById('telefono').value,
        tipo, ancho, alto, total, lucera, textoAcceso, descServicio,
        fecha: new Date().toLocaleDateString(), modelo: document.getElementById('modelo_motor').value,
        id: Date.now()
    };

    let h = JSON.parse(localStorage.getItem('pac_historial') || "[]");
    h.unshift(window.detalle);
    localStorage.setItem('pac_historial', JSON.stringify(h));

    document.getElementById('resultado').style.display = 'block';
    document.getElementById('res_total').innerText = `TOTAL: $${total.toLocaleString('es-AR')}`;
    
    // MENSAJE DE WHATSAPP RESTAURADO
    window.mensajeWPP = `Hola *${cliente}*, ¡un gusto saludarte! 👋\n\n` +
    `Soy *Emanuel* de *Portones Automáticos Córdoba*. Esta es la propuesta integral para tu hogar:\n\n` +
    `🏠 *Servicio:* ${descServicio} (${tipo.toUpperCase()})\n` +
    `📏 *Medidas:* ${ancho}m x ${alto}m\n` +
    (window.detalle.modelo ? `⚡ *Tecnología:* Motor ${window.detalle.modelo}\n` : "") +
    (lucera === 'si' ? `✨ *Detalle:* Lucera para iluminación natural\n` : "") +
    (textoAcceso ? `🚪 *Acceso:* ${textoAcceso}\n` : "") +
    `✅ *Incluye:* Materiales premium, instalación técnica y garantía certificada.\n\n` +
    `💰 *INVERSIÓN TOTAL:* $${total.toLocaleString('es-AR')}\n\n` +
    `*¿Te gustaría que agendemos una visita técnica para comenzar?* 🚀`;
}

function switchTab(tab) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.getElementById(tab).classList.add('active');
    document.getElementById('nav-' + tab.substring(0,4)).classList.add('active');
    if(tab === 'historial') renderHistorial();
}

function renderHistorial() {
    const lista = document.getElementById('lista-historial');
    const datos = JSON.parse(localStorage.getItem('pac_historial') || "[]");
    lista.innerHTML = datos.length ? "" : "<p>No hay presupuestos.</p>";
    datos.forEach((p) => {
        lista.innerHTML += `<div class="historial-item">
            <div><strong>${p.cliente}</strong><br><small>${p.fecha} - ${p.tipo}</small></div>
            <div style="display:flex; align-items:center">
                <span class="hist-price">$${p.total.toLocaleString('es-AR')}</span>
                <button onclick="eliminarUno(${p.id})" style="background:var(--red); border:none; color:#fff; border-radius:5px; cursor:pointer; padding:5px 10px">X</button>
            </div>
        </div>`;
    });
}

function eliminarUno(id) {
    let h = JSON.parse(localStorage.getItem('pac_historial')).filter(x => x.id !== id);
    localStorage.setItem('pac_historial', JSON.stringify(h));
    renderHistorial();
}

function borrarTodo() { if(confirm("¿Borrar historial?")) { localStorage.removeItem('pac_historial'); renderHistorial(); } }

function enviarWhatsApp() { window.open(`https://wa.me/54${window.detalle.tel}?text=${encodeURIComponent(window.mensajeWPP)}`, '_blank'); }

function generarPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    const d = window.detalle;
    doc.setFillColor(15, 23, 42); doc.rect(0, 0, 210, 50, 'F');
    doc.setTextColor(255, 255, 255); doc.setFontSize(24); doc.setFont("helvetica", "bold");
    doc.text("PAC - APERTURAS", 20, 30);
    doc.setFontSize(10); doc.text("SISTEMAS AUTOMATIZADOS E INGENIERÍA EN HIERRO", 20, 38);
    doc.setTextColor(51, 65, 85); doc.setFontSize(12);
    doc.text(`ATENCIÓN: ${d.cliente.toUpperCase()}`, 20, 65);
    doc.text(`FECHA: ${d.fecha}`, 150, 65);
    doc.setDrawColor(59, 130, 246); doc.setLineWidth(1); doc.line(20, 70, 190, 70);
    doc.setFontSize(14); doc.text("PROPUESTA TÉCNICA", 20, 85);
    doc.setFontSize(11); doc.setFont("helvetica", "normal");
    const specs = [
        `• Estructura: Portón ${d.tipo.toUpperCase()}`,
        `• Dimensiones: ${d.ancho}m de ancho x ${d.alto}m de alto`,
        d.modelo ? `• Automatización: Equipo ${d.modelo}` : "• Sistema: Apertura Manual",
        d.textoAcceso ? `• Acceso: ${d.textoAcceso}` : null,
        d.lucera === 'si' ? "• Extra: Lucera para iluminación natural" : null
    ].filter(x => x);
    let y = 95;
    specs.forEach(s => { doc.text(s, 25, y); y += 8; });
    doc.setFillColor(241, 245, 249); doc.rect(20, y + 5, 170, 45, 'F');
    doc.setTextColor(30, 41, 59); doc.setFont("helvetica", "bold");
    doc.text("VALOR AGREGADO PAC:", 25, y + 15);
    doc.setFont("helvetica", "normal"); doc.setFontSize(10);
    doc.text("- Pintura base anticorrosiva y acabados de precisión.", 25, y + 22);
    doc.text("- Soldadura técnica para máxima durabilidad estructural.", 25, y + 28);
    doc.text("- Instalación certificada con garantía de 12 meses.", 25, y + 34);
    doc.setFillColor(34, 197, 94); doc.rect(20, 200, 170, 35, 'F');
    doc.setTextColor(255, 255, 255); doc.setFontSize(14); doc.text("INVERSIÓN FINAL LLAVE EN MANO", 105, 210, {align: 'center'});
    doc.setFontSize(26); doc.text(`$${d.total.toLocaleString('es-AR')}`, 105, 225, {align: 'center'});
    doc.save(`Propuesta_PAC_${d.cliente}.pdf`);
}

function exportarReporteMensual() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    const datos = JSON.parse(localStorage.getItem('pac_historial') || "[]");
    doc.setFontSize(18); doc.text("REPORTE COMERCIAL MENSUAL", 20, 20);
    let y = 40; let total = 0;
    datos.forEach(p => {
        doc.setFontSize(10); doc.text(`${p.fecha} - ${p.cliente.substring(0,15)}... - ${p.tipo}: $${p.total.toLocaleString('es-AR')}`, 20, y);
        total += p.total; y += 8;
    });
    doc.setFontSize(14); doc.setFont("helvetica", "bold");
    doc.text(`TOTAL PRESUPUESTADO: $${total.toLocaleString('es-AR')}`, 20, y + 10);
    doc.save("Reporte_Mensual_PAC.pdf");
}
actualizarInterfaz();
</script>
</body>
</html>
