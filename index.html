<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portones Automáticos Córdoba - Presupuestos</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
  :root {
    --bg: #0f172a;
    --card: #1e293b;
    --text: #f8fafc;
    --accent: #3b82f6;
    --green: #22c55e;
  }

  body { 
    font-family: 'Segoe UI', Roboto, sans-serif; 
    margin: 0; 
    background: var(--bg); 
    color: var(--text);
    line-height: 1.6;
  }

  /* HEADER CON LOGO A LA IZQUIERDA */
  header { 
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 15px; 
    background: #020617; 
    border-bottom: 2px solid var(--accent);
  }

  header img {
    height: 40px; /* Tamaño del logo en el titulo */
    width: auto;
    border-radius: 4px;
  }

  header h1 {
    font-size: 18px;
    margin: 0;
    font-weight: bold;
    letter-spacing: 0.5px;
  }

  .container { 
    padding: 20px; 
    max-width: 800px; 
    margin: auto; 
  }

  .grid-form {
    display: grid;
    grid-template-columns: 1fr;
    gap: 15px;
    margin-bottom: 20px;
  }

  @media (min-width: 600px) {
    .grid-form { grid-template-columns: 1fr 1fr; }
    .full-width { grid-column: span 2; }
  }

  label { font-size: 12px; color: #94a3b8; display: block; margin-bottom: 5px; text-transform: uppercase; font-weight: 600; }

  input, select {
    width: 100%; 
    padding: 12px; 
    border-radius: 8px; 
    border: 1px solid #334155;
    background: #020617;
    color: #fff;
    box-sizing: border-box;
    font-size: 16px;
  }

  input:focus { border-color: var(--accent); outline: none; }

  .actions {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 20px;
  }

  @media (min-width: 600px) {
    .actions { flex-direction: row; }
  }

  button {
    flex: 1;
    padding: 15px; 
    border: none; 
    border-radius: 8px; 
    font-weight: bold; 
    cursor: pointer;
    transition: all 0.2s;
    font-size: 15px;
  }

  button:active { transform: scale(0.98); }

  .btn-green { background: var(--green); color: #052e16; }
  .btn-blue { background: var(--accent); color: #fff; }
  .btn-gray { background: #475569; color: #fff; }

  .card { 
    background: var(--card); 
    padding: 20px; 
    border-radius: 12px; 
    margin-top: 20px; 
    border: 1px solid #334155;
  }

  .res-item { display: flex; justify-content: space-between; margin-bottom: 8px; }
  .total-row { 
    border-top: 1px solid #334155; 
    padding-top: 10px; 
    font-size: 22px; 
    font-weight: bold; 
    color: var(--green);
  }
</style>
</head>

<body>

<header>
  <img src="icono.png" alt="Logo">
  <h1>Portones Automáticos Córdoba</h1>
</header>

<div class="container">
  
  <div class="grid-form">
    <div class="full-width">
      <label>Nombre del Cliente</label>
      <input id="cliente" placeholder="Ej: Juan Pérez">
    </div>
    
    <div>
      <label>WhatsApp</label>
      <input id="telefono" type="tel" placeholder="351xxxxxxx">
    </div>

    <div>
      <label>Tipo de Portón</label>
      <select id="tipo">
        <option value="corredizo">Portón Corredizo</option>
        <option value="levadizo">Portón Levadizo</option>
      </select>
    </div>

    <div>
      <label>Ancho (m)</label>
      <input id="ancho" type="number" step="0.01" placeholder="3.00">
    </div>

    <div>
      <label>Alto (m)</label>
      <input id="alto" type="number" step="0.01" placeholder="2.00">
    </div>

    <div>
      <label>Chapa</label>
      <select id="chapa">
        <option value="18">Chapa 18</option>
        <option value="20">Chapa 20</option>
      </select>
    </div>

    <div>
      <label>Valor Dólar ($)</label>
      <input id="dolar" type="number" placeholder="Ej: 1150">
    </div>

    <div>
      <label>Motorización</label>
      <select id="motor" onchange="toggleMotor()">
        <option value="no">Sin motor</option>
        <option value="si">Con motor</option>
      </select>
    </div>

    <div id="div_modelo" style="display:none">
      <label>Modelo de Motor</label>
      <input id="modelo_motor" placeholder="Ej: PPA 1/4 HP">
    </div>

    <div id="div_precio" style="display:none">
      <label>Precio Motor ($)</label>
      <input id="precio_motor" type="number" placeholder="Costo motor">
    </div>

    <div class="full-width">
      <label>Extras / Otros ($)</label>
      <input id="extras" type="number" placeholder="Pintura, herrajes, etc.">
    </div>
  </div>

  <button class="btn-green" onclick="calcular()">CALCULAR PRESUPUESTO</button>

  <div id="resultado" class="card" style="display:none"></div>

  <div class="actions">
    <button class="btn-blue" onclick="enviarWhatsApp()">Enviar WhatsApp</button>
    <button class="btn-gray" onclick="generarPDF()">Generar Propuesta PDF</button>
  </div>

</div>

<script>
function toggleMotor() {
  const m = document.getElementById('motor').value;
  document.getElementById('div_modelo').style.display = m === 'si' ? 'block' : 'none';
  document.getElementById('div_precio').style.display = m === 'si' ? 'block' : 'none';
}

function getPrecioM2(tipo, chapa){
  if(tipo==="levadizo") return chapa==="18"?145.41:123.13;
  return chapa==="18"?157.24:110.06;
}

function num(id){ return parseFloat(document.getElementById(id).value)||0; }

function calcular(){
  let tipo = document.getElementById('tipo').value;
  let chapa = document.getElementById('chapa').value;
  let ancho = num('ancho');
  let alto = num('alto');
  let dolar = num('dolar');

  if(!ancho || !alto || !dolar){
    alert("Faltan datos obligatorios");
    return;
  }

  let m2 = ancho * alto;
  let usd = getPrecioM2(tipo,chapa);
  let base = m2 * usd * dolar;

  let motorActivo = document.getElementById('motor').value;
  let modelo = document.getElementById('modelo_motor').value;
  
  let totalPorton = (motorActivo === "no") ? base * 1.3 : base;
  let totalMotor = (motorActivo === "si") ? num('precio_motor') + 200000 : 0;
  let extras = num('extras');

  window.detalle = {
    porton: Math.round(totalPorton),
    motor: Math.round(totalMotor),
    extras: Math.round(extras),
    total: Math.round(totalPorton + totalMotor + extras),
    m2: m2.toFixed(2),
    tipo: tipo,
    modelo: modelo,
    ancho: ancho,
    alto: alto,
    chapa: chapa
  };

  // 🛠 SOLUCIÓN EMOJIS: Usando códigos Unicode para evitar errores de rombos
  const wave = "\uD83D\uDC4B";
  const wrench = "\uD83D\uDD27";
  const ruler = "\uD83D\uDCCF";
  const hammer = "\uD83D\uDEE0";
  const check = "\u2714";
  const bolt = "\u26A1";
  const money = "\uD83D\uDCB0";
  const spark = "\u2728";

  window.mensajeWPP = `Hola ${document.getElementById('cliente').value || "cliente"}, ¡un gusto saludarte! ${wave}

Soy *Emanuel* de *Portones Automáticos Córdoba*. Diseñé esta propuesta para mejorar la seguridad y confort de tu hogar:

${wrench} *Proyecto:* Fabricación de Portón ${tipo.toUpperCase()}
${ruler} *Medidas:* ${ancho}m x ${alto}m
${hammer} *Material:* Chapa reforzada del ${chapa}
${check} *Incluye:* Entrega, instalación profesional y garantía.

${motorActivo === "si" ? `${bolt} *Confort Total:* Incluye motor ${modelo} de alto tránsito.` : "💡 *Nota:* Preparado para automatizar en el futuro."}

${money} *INVERSIÓN TOTAL:* $${window.detalle.total.toLocaleString('es-AR')}

Lo mejor de este sistema es la tranquilidad de entrar a casa con un solo clic. ${spark}

¿Te gustaría que coordinemos una visita para cerrar los detalles?`;

  const resDiv = document.getElementById('resultado');
  resDiv.style.display = 'block';
  resDiv.innerHTML = `
    <div class="res-item"><span>Estructura:</span> <span>$${window.detalle.porton.toLocaleString('es-AR')}</span></div>
    <div class="res-item"><span>Motorización:</span> <span>$${window.detalle.motor.toLocaleString('es-AR')}</span></div>
    <div class="res-item"><span>Adicionales:</span> <span>$${window.detalle.extras.toLocaleString('es-AR')}</span></div>
    <div class="res-item total-row"><span>INVERSIÓN FINAL:</span> <span>$${window.detalle.total.toLocaleString('es-AR')}</span></div>
  `;
}

function enviarWhatsApp(){
  let numero = document.getElementById('telefono').value;
  if(!window.mensajeWPP) { alert("Calculá primero"); return; }
  if(!numero) { alert("Ingresá el número"); return; }
  let url = `https://wa.me/54${numero}?text=${encodeURIComponent(window.mensajeWPP)}`;
  window.open(url, '_blank');
}

function generarPDF(){
  if(!window.detalle){ alert("Calculá primero"); return; }
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  const img = new Image();
  img.src = 'icono.png';
  
  img.onload = function(){
    doc.setFillColor(15, 23, 42);
    doc.rect(0, 0, 210, 50, 'F');
    doc.addImage(img, 'PNG', 15, 10, 30, 30);
    doc.setTextColor(255, 255, 255);
    doc.setFontSize(22);
    doc.setFont("helvetica", "bold");
    doc.text("PROPUESTA DE VALOR", 55, 25);
    doc.setFontSize(12);
    doc.setFont("helvetica", "normal");
    doc.text("Seguridad y Confort para tu Hogar", 55, 33);
    doc.setTextColor(0, 0, 0);
    doc.setFontSize(11);
    doc.text(`PARA: ${document.getElementById('cliente').value.toUpperCase()}`, 20, 65);
    doc.text(`FECHA: ${new Date().toLocaleDateString()}`, 150, 65);
    doc.text(`ASESOR: EMANUEL`, 150, 72);
    doc.setDrawColor(59, 130, 246);
    doc.line(20, 75, 190, 75);
    doc.setFontSize(14);
    doc.setFont("helvetica", "bold");
    doc.text("DETALLES DEL PROYECTO:", 20, 90);
    doc.setFont("helvetica", "normal");
    doc.setFontSize(11);
    let textoVenta = `Este sistema ha sido diseñado bajo medidas de ${window.detalle.ancho}m x ${window.detalle.alto}m utilizando materiales de alta durabilidad (Chapa ${window.detalle.chapa}) para garantizar la máxima seguridad y fluidez en el acceso.`;
    let lineas = doc.splitTextToSize(textoVenta, 170);
    doc.text(lineas, 20, 100);
    doc.setFont("helvetica", "bold");
    doc.text("• Estructura:", 25, 120);
    doc.setFont("helvetica", "normal");
    doc.text(`Portón ${window.detalle.tipo} reforzado.`, 60, 120);
    if(window.detalle.motor > 0) {
      doc.setFont("helvetica", "bold");
      doc.text("• Automatización:", 25, 128);
      doc.setFont("helvetica", "normal");
      doc.text(`Sistema con motor ${window.detalle.modelo}.`, 65, 128);
    }
    doc.setFont("helvetica", "bold");
    doc.text("• Instalación:", 25, 136);
    doc.setFont("helvetica", "normal");
    doc.text("Servicio llave en mano con puesta a punto.", 60, 136);
    doc.setDrawColor(34, 197, 94);
    doc.rect(20, 160, 170, 35);
    doc.setFontSize(11);
    doc.text("INVERSIÓN TOTAL DEL PROYECTO:", 105, 170, {align: 'center'});
    doc.setFontSize(24);
    doc.setFont("helvetica", "bold");
    doc.setTextColor(21, 128, 61);
    doc.text(`$${window.detalle.total.toLocaleString('es-AR')}`, 105, 185, {align: 'center'});
    doc.setTextColor(100, 100, 100);
    doc.setFontSize(10);
    doc.text("¡Comencemos hoy mismo a transformar tu ingreso!", 105, 230, {align: 'center'});
    doc.save(`Propuesta_${document.getElementById('cliente').value}.pdf`);
  };
}
</script>

</body>
</html>
