<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portones Automáticos Córdoba</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
  :root { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #3b82f6; --green: #22c55e; }
  body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: var(--text); }
  nav { display: flex; background: #020617; border-bottom: 2px solid var(--accent); }
  nav button { flex: 1; padding: 15px; border: none; background: none; color: #94a3b8; font-weight: bold; cursor: pointer; }
  nav button.active { color: #fff; border-bottom: 3px solid var(--accent); }
  header { display: flex; align-items: center; justify-content: center; gap: 12px; padding: 15px; background: #020617; }
  header img { height: 35px; border-radius: 4px; }
  header h1 { font-size: 16px; margin: 0; }
  .container { padding: 20px; max-width: 800px; margin: auto; }
  .section { display: none; }
  .section.active { display: block; }
  .grid-form { display: grid; grid-template-columns: 1fr; gap: 12px; }
  @media (min-width: 600px) { .grid-form { grid-template-columns: 1fr 1fr; } .full { grid-column: span 2; } }
  label { font-size: 11px; color: #94a3b8; text-transform: uppercase; font-weight: 600; }
  input, select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #334155; background: #020617; color: #fff; box-sizing: border-box; }
  button.main { width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
  .btn-green { background: var(--green); color: #052e16; }
  .btn-blue { background: var(--accent); color: #fff; }
  .btn-gray { background: #475569; color: #fff; }
  .card { background: var(--card); padding: 15px; border-radius: 12px; margin-top: 15px; border: 1px solid #334155; }
  .historial-item { background: var(--card); padding: 15px; border-radius: 10px; margin-bottom: 10px; border-left: 4px solid var(--accent); }
  .historial-header { display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 5px; }
  .historial-body { font-size: 13px; color: #cbd5e1; }
  .historial-actions { display: flex; gap: 10px; margin-top: 10px; }
  .btn-sm { padding: 8px; font-size: 12px; border-radius: 5px; flex: 1; text-align: center; text-decoration: none; font-weight: bold; }
</style>
</head>

<body>

<nav>
  <button id="btn-calc" class="active" onclick="switchTab('calculadora')">NUEVO</button>
  <button id="btn-hist" onclick="switchTab('historial')">HISTORIAL</button>
</nav>

<header>
  <img src="icono.png" alt="Logo">
  <h1>Portones Automáticos Córdoba</h1>
</header>

<div class="container">
  
  <div id="calculadora" class="section active">
    <div class="grid-form">
      <div class="full"><label>Cliente</label><input id="cliente" placeholder="Nombre completo"></div>
      <div><label>WhatsApp</label><input id="telefono" type="tel" placeholder="351xxxxxxx"></div>
      <div><label>Tipo de Portón</label><select id="tipo" onchange="actualizarInterfaz()"><option value="corredizo">Corredizo</option><option value="levadizo">Levadizo</option></select></div>
      <div><label>Ancho (m)</label><input id="ancho" type="number" step="0.01" oninput="actualizarInterfaz()"></div>
      <div><label>Alto (m)</label><input id="alto" type="number" step="0.01"></div>
      <div><label id="label_dolar">Dólar ($)</label><input id="dolar" type="number"></div>
      
      <div class="full"><label>Servicio de Motor</label>
        <select id="motor" onchange="actualizarInterfaz()">
          <option value="no">Sin motor (Sólo Portón)</option>
          <option value="si">Fabricación + Automatización</option>
          <option value="solo_inst">Sólo Instalación (Portón existente)</option>
        </select>
      </div>

      <div id="div_peso" class="full" style="display:none">
        <label>Peso / Tracción del Portón</label>
        <select id="peso_porton" onchange="actualizarInterfaz()">
          <option value="liviano">Liviano (Estándar)</option>
          <option value="pesado">Pesado (Industrial / Grande)</option>
        </select>
      </div>

      <div id="config_especial_lev" style="display:none" class="full card">
        <label style="color:var(--accent)">Configuración Levadizo Grande</label>
        <div class="grid-form" style="margin-top:10px">
          <div><label>Cantidad Motores</label><select id="cant_motores"><option value="1">1 Motor</option><option value="2">2 Motores</option></select></div>
          <div><label>Tipo Sistema</label><select id="sistema_tipo"><option value="Levante">Sistema Levante</option><option value="Torsion">Sistema Torsión</option></select></div>
        </div>
      </div>

      <div id="div_modelo" style="display:none"><label>Modelo Motor</label><input id="modelo_motor" placeholder="Ej: PPA Jet Flex"></div>
      <div id="div_precio" style="display:none"><label id="label_precio_motor">Precio Unitario Motor ($)</label><input id="precio_motor" type="number"></div>
      <div class="full"><label>Extras ($)</label><input id="extras" type="number"></div>
    </div>

    <button class="main btn-green" onclick="calcular()">CALCULAR Y GUARDAR</button>
    <div id="resultado" class="card" style="display:none"></div>
    
    <div class="grid-form" style="margin-top:10px">
      <button class="main btn-blue" onclick="enviarWhatsApp()">Enviar WhatsApp</button>
      <button class="main btn-gray" onclick="generarPDF()">Descargar PDF</button>
    </div>
  </div>

  <div id="historial" class="section">
    <div id="lista-historial"></div>
    <button class="main btn-gray" style="background:#ef4444; margin-top:20px" onclick="borrarHistorial()">BORRAR TODO EL HISTORIAL</button>
  </div>

</div>

<script>
function switchTab(tab) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById(tab).classList.add('active');
  document.getElementById(tab === 'calculadora' ? 'btn-calc' : 'btn-hist').classList.add('active');
  if(tab === 'historial') cargarHistorial();
}

function actualizarInterfaz() {
  const motor = document.getElementById('motor').value;
  const tipo = document.getElementById('tipo').value;
  const ancho = parseFloat(document.getElementById('ancho').value) || 0;
  const peso = document.getElementById('peso_porton').value;

  document.getElementById('div_modelo').style.display = (motor !== 'no') ? 'block' : 'none';
  document.getElementById('div_precio').style.display = (motor !== 'no') ? 'block' : 'none';
  document.getElementById('div_peso').style.display = (motor === 'solo_inst') ? 'block' : 'none';

  // Lógica de visibilidad Levadizo Especial
  const esLevEspecial = (tipo === 'levadizo' && ancho > 2.60 && motor === 'solo_inst');
  document.getElementById('config_especial_lev').style.display = esLevEspecial ? 'block' : 'none';

  // Ajuste de labels informativo para Corredizo Pesado
  const labelMotor = document.getElementById('label_precio_motor');
  if(motor === 'solo_inst') {
    if(tipo === 'corredizo' && peso === 'pesado') {
        labelMotor.innerText = "Precio del Motor ($)";
    } else if (tipo === 'corredizo') {
        labelMotor.innerText = "Costo Motor (Informativo)";
    }
    document.getElementById('dolar').style.opacity = "0.3";
  } else {
    labelMotor.innerText = "Precio Motor ($)";
    document.getElementById('dolar').style.opacity = "1";
  }
}

function num(id){ return parseFloat(document.getElementById(id).value)||0; }

function calcular(){
  let cliente = document.getElementById('cliente').value;
  let tipo = document.getElementById('tipo').value;
  let ancho = num('ancho');
  let alto = num('alto');
  let dolar = num('dolar');
  let motorModo = document.getElementById('motor').value;
  let peso = document.getElementById('peso_porton').value;

  if(!ancho || !alto || !cliente){ alert("Faltan datos."); return; }

  let totalFinal = 0;
  let subtexto = "";

  if(motorModo === 'solo_inst'){
    if(tipo === 'corredizo'){
      if(peso === 'pesado'){
        // LÓGICA CORREDIZO PESADO: 200k MO + Motor + Metros extras
        let baseMO = 200000;
        let extrasM = (ancho > 3) ? (ancho - 3) * 30000 : 0;
        totalFinal = baseMO + num('precio_motor') + extrasM;
        subtexto = "Automatización Corredizo Pesado";
      } else {
        // LÓGICA LIVIANO (PAQUETE)
        let basePaquete = 400000;
        let extrasM = (ancho > 3) ? (ancho - 3) * 30000 : 0;
        totalFinal = basePaquete + extrasM;
        subtexto = "Automatización Corredizo Liviano";
      }
    } 
    else { // LEVADIZO
      if(ancho > 2.60){
        let cant = parseInt(document.getElementById('cant_motores').value);
        let sist = document.getElementById('sistema_tipo').value;
        let manoObra = (cant === 2) ? 350000 : 200000;
        totalFinal = manoObra + (num('precio_motor') * cant);
        subtexto = `Automatización Levadizo ${sist} (${cant} motor/es)`;
      } else {
        totalFinal = 400000;
        subtexto = "Automatización Levadizo Estándar";
      }
    }
    totalFinal += num('extras');
  } 
  else { // FABRICACIÓN
    if(!dolar) { alert("Ingresá el dólar."); return; }
    let m2 = ancho * alto;
    let usdPorM2 = (tipo==="levadizo") ? 145.41 : 157.24; 
    let basePesos = m2 * usdPorM2 * dolar;
    let costoPorton = (motorModo === "no") ? basePesos * 1.3 : basePesos;
    let costoMotorYInstalacion = (motorModo === "si") ? (num('precio_motor') + 200000) : 0;
    totalFinal = Math.round(costoPorton + costoMotorYInstalacion + num('extras'));
    subtexto = `Fabricación de portón ${tipo}`;
  }

  window.detalle = {
    cliente, tel: document.getElementById('telefono').value,
    tipo, ancho, alto, total: totalFinal, subtexto,
    fecha: new Date().toLocaleDateString(), modelo: document.getElementById('modelo_motor').value
  };

  let h = JSON.parse(localStorage.getItem('presupuestos') || "[]");
  h.unshift(window.detalle);
  localStorage.setItem('presupuestos', JSON.stringify(h.slice(0, 50)));

  window.mensajeWPP = `Hola ${cliente}, ¡un gusto! 👋\n\n` +
  `Soy *Emanuel* de *Portones Automáticos Córdoba*. Propuesta técnica:\n\n` +
  `⚙ *Servicio:* ${subtexto}\n` +
  `📏 *Medidas:* ${ancho}m x ${alto}m\n` +
  (window.detalle.modelo ? `⚡ *Motor:* ${window.detalle.modelo}\n` : "") +
  `💰 *INVERSIÓN TOTAL:* $${totalFinal.toLocaleString('es-AR')}\n\n` +
  `¿Te gustaría que coordinemos una visita? ✨`;

  document.getElementById('resultado').style.display = 'block';
  document.getElementById('resultado').innerHTML = `<strong>Total: $${totalFinal.toLocaleString('es-AR')}</strong><br><small>Guardado en historial</small>`;
}

function cargarHistorial() {
  const lista = document.getElementById('lista-historial');
  const datos = JSON.parse(localStorage.getItem('presupuestos') || "[]");
  lista.innerHTML = datos.length === 0 ? "<p style='text-align:center'>No hay registros.</p>" : "";
  datos.forEach((p, index) => {
    lista.innerHTML += `<div class="historial-item">
      <div class="historial-header"><span>${p.cliente}</span><span style="color:var(--green)">$${p.total.toLocaleString('es-AR')}</span></div>
      <div class="historial-body">${p.fecha} | ${p.subtexto}<br>Tel: ${p.tel}</div>
      <div class="historial-actions">
        <a href="https://wa.me/54${p.tel}" target="_blank" class="btn-sm btn-green">WPP</a>
        <button onclick="eliminarUno(${index})" class="btn-sm btn-gray" style="background:#ef4444">X</button>
      </div>
    </div>`;
  });
}

function eliminarUno(index) {
  let h = JSON.parse(localStorage.getItem('presupuestos'));
  h.splice(index, 1);
  localStorage.setItem('presupuestos', JSON.stringify(h));
  cargarHistorial();
}

function borrarHistorial() { if(confirm("¿Borrar todo?")) { localStorage.removeItem('presupuestos'); cargarHistorial(); } }

function enviarWhatsApp(){
  if(!window.mensajeWPP) return;
  window.open(`https://wa.me/54${document.getElementById('telefono').value}?text=${encodeURIComponent(window.mensajeWPP)}`, '_blank');
}

function generarPDF(){
  if(!window.detalle) return;
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  const img = new Image(); img.src = 'icono.png';
  img.onload = function(){
    doc.setFillColor(15, 23, 42); doc.rect(0, 0, 210, 50, 'F');
    doc.addImage(img, 'PNG', 15, 10, 30, 30);
    doc.setTextColor(255, 255, 255); doc.setFontSize(22); doc.setFont("helvetica", "bold");
    doc.text("PROPUESTA DE VALOR", 55, 25);
    doc.setTextColor(0,0,0); doc.setFontSize(11);
    doc.text(`PARA: ${window.detalle.cliente.toUpperCase()}`, 20, 65);
    doc.text(`FECHA: ${window.detalle.fecha}`, 150, 65);
    doc.setDrawColor(59, 130, 246); doc.line(20, 75, 190, 75);
    doc.setFontSize(14); doc.setFont("helvetica", "bold");
    doc.text("DETALLES DEL SERVICIO:", 20, 90);
    doc.setFont("helvetica", "normal"); doc.setFontSize(11);
    doc.text(`- Servicio: ${window.detalle.subtexto}`, 25, 100);
    doc.text(`- Medidas: ${window.detalle.ancho}m x ${window.detalle.alto}m`, 25, 107);
    if(window.detalle.modelo) doc.text(`- Motor: ${window.detalle.modelo}`, 25, 114);
    doc.text(`- Incluye: Provisión, instalación y garantía profesional`, 25, 121);
    doc.setDrawColor(34, 197, 94); doc.rect(20, 175, 170, 35);
    doc.text("INVERSIÓN TOTAL:", 105, 185, {align: 'center'});
    doc.setFontSize(24); doc.setTextColor(21, 128, 61);
    doc.text(`$${window.detalle.total.toLocaleString('es-AR')}`, 105, 200, {align: 'center'});
    doc.save(`Propuesta_${window.detalle.cliente}.pdf`);
  };
}
</script>
</body>
</html>
