<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portones Automáticos Córdoba - Pro</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
  :root { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #3b82f6; --green: #22c55e; }
  body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: var(--text); }
  nav { display: flex; background: #020617; border-bottom: 2px solid var(--accent); }
  nav button { flex: 1; padding: 15px; border: none; background: none; color: #94a3b8; font-weight: bold; cursor: pointer; }
  nav button.active { color: #fff; border-bottom: 3px solid var(--accent); }
  header { display: flex; align-items: center; justify-content: center; gap: 12px; padding: 15px; background: #020617; }
  header img { height: 35px; border-radius: 4px; }
  header h1 { font-size: 16px; margin: 0; }
  .container { padding: 20px; max-width: 800px; margin: auto; }
  .section { display: none; }
  .section.active { display: block; }
  .grid-form { display: grid; grid-template-columns: 1fr; gap: 12px; }
  @media (min-width: 600px) { .grid-form { grid-template-columns: 1fr 1fr; } .full { grid-column: span 2; } }
  label { font-size: 11px; color: #94a3b8; text-transform: uppercase; font-weight: 600; }
  input, select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #334155; background: #020617; color: #fff; box-sizing: border-box; }
  button.main { width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
  .btn-green { background: var(--green); color: #052e16; }
  .btn-blue { background: var(--accent); color: #fff; }
  .btn-gray { background: #475569; color: #fff; }
  .card { background: var(--card); padding: 15px; border-radius: 12px; margin-top: 15px; border: 1px solid #334155; }
  .historial-item { background: var(--card); padding: 15px; border-radius: 10px; margin-bottom: 10px; border-left: 4px solid var(--accent); }
</style>
</head>

<body>

<nav>
  <button id="btn-calc" class="active" onclick="switchTab('calculadora')">NUEVO</button>
  <button id="btn-hist" onclick="switchTab('historial')">HISTORIAL</button>
</nav>

<header>
  <img src="icono.png" alt="Logo">
  <h1>Portones Automáticos Córdoba</h1>
</header>

<div class="container">
  
  <div id="calculadora" class="section active">
    <div class="grid-form">
      <div class="full"><label>Cliente</label><input id="cliente" placeholder="Nombre completo"></div>
      <div><label>WhatsApp</label><input id="telefono" type="tel" placeholder="351xxxxxxx"></div>
      <div><label>Tipo de Portón</label><select id="tipo" onchange="actualizarInterfaz()">
        <option value="corredizo">Corredizo</option>
        <option value="levadizo">Levadizo</option>
      </select></div>
      
      <div class="full"><label>Tipo de Medida</label><select id="modo_medida" onchange="actualizarInterfaz()">
        <option value="especial">Medida Especial (por m²)</option>
        <option value="estandar">Medida Estándar (Precio Fijo)</option>
      </select></div>

      <div id="div_medida_especial" class="full grid-form" style="display:grid; gap:12px; padding:0">
        <div><label>Ancho (m)</label><input id="ancho" type="number" step="0.01"></div>
        <div><label>Alto (m)</label><input id="alto" type="number" step="0.01"></div>
      </div>

      <div id="div_medida_estandar" class="full" style="display:none">
        <label>Seleccionar Medida Estándar</label>
        <select id="select_estandar"></select>
      </div>

      <div><label>Dólar ($)</label><input id="dolar" type="number" value="1410"></div>
      
      <div class="full"><label>Servicio de Motor</label>
        <select id="motor" onchange="actualizarInterfaz()">
          <option value="no">Sin motor (Sólo Portón)</option>
          <option value="si">Fabricación + Automatización</option>
          <option value="solo_inst">Sólo Instalación (Portón existente)</option>
        </select>
      </div>

      <div id="div_peso" class="full" style="display:none"><label>Peso / Tracción</label>
        <select id="peso_porton"><option value="liviano">Liviano</option><option value="pesado">Pesado</option></select>
      </div>

      <div id="div_precio" style="display:none"><label>Precio del Motor ($)</label><input id="precio_motor" type="number"></div>
      <div id="div_modelo" style="display:none"><label>Modelo Motor</label><input id="modelo_motor" placeholder="Ej: PPA Jet Flex"></div>
      
      <div class="full card" style="background:#111827">
        <label style="color:var(--accent)">Adicionales y Estética</label>
        <div class="grid-form" style="margin-top:10px">
            <div><label>Puerta Conjugada ($)</label><input id="puerta_conjugada" type="number" placeholder="0"></div>
            <div><label>¿Lleva Lucera?</label><select id="lucera"><option value="no">No</option><option value="si">Sí (Iluminación natural)</option></select></div>
            <div class="full"><label>Otros Extras ($)</label><input id="extras" type="number" placeholder="0"></div>
        </div>
      </div>
    </div>

    <button class="main btn-green" onclick="calcular()">GENERAR PROPUESTA</button>
    <div id="resultado" class="card" style="display:none"></div>
    
    <div class="grid-form" style="margin-top:10px">
      <button class="main btn-blue" onclick="enviarWhatsApp()">Enviar WhatsApp</button>
      <button class="main btn-gray" onclick="generarPDF()">Descargar PDF</button>
    </div>
  </div>

  <div id="historial" class="section">
    <div id="lista-historial"></div>
  </div>

</div>

<script>
const preciosEstandar = {
    corredizo: [ { desc: "3.00 x 2.00 Estándar", usd: 619.31, ancho: 3, alto: 2 } ],
    levadizo: [
        { desc: "2.40 x 2.05 sin puerta", usd: 693.51, ancho: 2.40, alto: 2.05 },
        { desc: "2.40 x 2.05 con puerta", usd: 823.27, ancho: 2.40, alto: 2.05 },
        { desc: "2.40 x 2.20 sin puerta", usd: 721.29, ancho: 2.40, alto: 2.20 },
        { desc: "2.40 x 2.20 con puerta", usd: 855.65, ancho: 2.40, alto: 2.20 },
        { desc: "2.62 x 2.05 sin puerta", usd: 711.48, ancho: 2.62, alto: 2.05 },
        { desc: "2.62 x 2.05 con puerta", usd: 841.43, ancho: 2.62, alto: 2.05 },
        { desc: "2.62 x 2.20 sin puerta", usd: 742.331, ancho: 2.62, alto: 2.20 },
        { desc: "2.62 x 2.20 con puerta", usd: 876.73, ancho: 2.62, alto: 2.20 }
    ]
};

function actualizarInterfaz() {
    const tipo = document.getElementById('tipo').value;
    const modo = document.getElementById('modo_medida').value;
    const motor = document.getElementById('motor').value;

    document.getElementById('div_medida_especial').style.display = (modo === 'especial') ? 'grid' : 'none';
    document.getElementById('div_medida_estandar').style.display = (modo === 'estandar') ? 'block' : 'none';
    document.getElementById('div_modelo').style.display = (motor !== 'no') ? 'block' : 'none';
    document.getElementById('div_precio').style.display = (motor !== 'no') ? 'block' : 'none';
    document.getElementById('div_peso').style.display = (motor === 'solo_inst') ? 'block' : 'none';

    if (modo === 'estandar') {
        const select = document.getElementById('select_estandar');
        select.innerHTML = "";
        preciosEstandar[tipo].forEach((p, i) => {
            select.innerHTML += `<option value="${i}">${p.desc} (${p.usd} USD)</option>`;
        });
    }
}

function num(id){ return parseFloat(document.getElementById(id).value)||0; }

function calcular() {
    const cliente = document.getElementById('cliente').value;
    const tipo = document.getElementById('tipo').value;
    const modo = document.getElementById('modo_medida').value;
    const motorModo = document.getElementById('motor').value;
    const dolar = num('dolar');
    const lucera = document.getElementById('lucera').value;
    
    let ancho, alto, usdBase;

    if (modo === 'estandar') {
        const item = preciosEstandar[tipo][document.getElementById('select_estandar').value];
        ancho = item.ancho; alto = item.alto; usdBase = item.usd;
    } else {
        ancho = num('ancho'); alto = num('alto');
        usdBase = (ancho * alto) * (tipo === "levadizo" ? 145.41 : 157.24);
    }

    if (!cliente || !ancho) { alert("Completar cliente y medidas"); return; }

    let total = 0;
    let subtexto = "";

    if (motorModo === 'solo_inst') {
        let base = 400000;
        if (tipo === 'corredizo') {
            total = (document.getElementById('peso_porton').value === 'pesado') ? (200000 + num('precio_motor')) : base;
            total += (ancho > 3) ? (ancho - 3) * 30000 : 0;
        } else {
            total = (ancho > 2.60) ? (200000 + num('precio_motor')) : base;
        }
        subtexto = "Automatización Profesional";
    } else {
        let costoPorton = (usdBase * dolar);
        if (motorModo === "no") costoPorton *= 1.3;
        let costoMotor = (motorModo === "si") ? (num('precio_motor') + 200000) : 0;
        total = costoPorton + costoMotor;
        subtexto = "Fabricación + Instalación";
    }

    total += num('puerta_conjugada') + num('extras');

    window.detalle = {
        cliente, tel: document.getElementById('telefono').value,
        tipo, ancho, alto, total: Math.round(total), subtexto, lucera,
        fecha: new Date().toLocaleDateString(), modelo: document.getElementById('modelo_motor').value
    };

    window.mensajeWPP = `Hola ${cliente}, ¡un gusto! 👋\n\n` +
    `Soy *Emanuel* de *Portones Automáticos Córdoba*. Esta es la propuesta integral para tu hogar:\n\n` +
    `🏠 *Proyecto:* ${subtexto} (${tipo.toUpperCase()})\n` +
    `📏 *Medidas:* ${ancho}m x ${alto}m\n` +
    (window.detalle.modelo ? `⚡ *Motor:* ${window.detalle.modelo}\n` : "") +
    (lucera === 'si' ? `✨ *Detalle:* Incorporación de lucera para iluminación natural\n` : "") +
    (num('puerta_conjugada') > 0 ? `🚪 *Adicional:* Incluye puerta conjugada de estética unificada\n` : "") +
    `✅ *Incluye:* Materiales de primera, instalación técnica y garantía certificada.\n\n` +
    `💰 *VALOR TOTAL:* $${Math.round(total).toLocaleString('es-AR')}\n\n` +
    `*¿Te gustaría que agendemos una visita técnica para comenzar?* 🚀`;

    document.getElementById('resultado').style.display = 'block';
    document.getElementById('resultado').innerHTML = `<strong>Total: $${Math.round(total).toLocaleString('es-AR')}</strong>`;
}

function switchTab(tab) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById(tab).classList.add('active');
}

function enviarWhatsApp() {
    window.open(`https://wa.me/54${document.getElementById('telefono').value}?text=${encodeURIComponent(window.mensajeWPP)}`, '_blank');
}

function generarPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    doc.setFillColor(15, 23, 42); doc.rect(0, 0, 210, 40, 'F');
    doc.setTextColor(255, 255, 255); doc.setFontSize(18); doc.text("PROPUESTA TÉCNICA COMERCIAL", 20, 25);
    doc.setTextColor(0,0,0); doc.setFontSize(12);
    doc.text(`CLIENTE: ${window.detalle.cliente}`, 20, 60);
    doc.text(`DETALLE: ${window.detalle.subtexto}`, 20, 70);
    doc.text(`MEDIDAS: ${window.detalle.ancho} x ${window.detalle.alto}`, 20, 80);
    if(window.detalle.lucera === 'si') doc.text(`ADICIONAL: Incorporación de Lucera`, 20, 90);
    doc.setFontSize(16); doc.setTextColor(21, 128, 61);
    doc.text(`INVERSIÓN FINAL: $${window.detalle.total.toLocaleString('es-AR')}`, 20, 110);
    doc.save(`Propuesta_${window.detalle.cliente}.pdf`);
}

actualizarInterfaz();
</script>
</body>
</html>
